{% extends "base.html" %}

{% block content %}
<section class="panel">
    <h1>Назначить тест</h1>
    <p class="muted">{{ test.title }}</p>

    <form method="post">
        <label>Сотрудник</label>
        <select name="user_id">
            {% for employee in employees %}
                <option value="{{ employee.id }}">{{ employee.full_name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Назначить</button>
    </form>
</section>
{% endblock %}
